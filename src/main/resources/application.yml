server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_gym?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 116688Hsj
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 5
        max-concurrency: 20
        prefetch: 10

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

redisson:
  single-server-config:
    address: "redis://localhost:6379"
    connection-pool-size: 20
    connection-minimum-idle-size: 5

gym:
  reservation:
    lock:
      wait-time: 3
      lease-time: 5
    queue:
      exchange: gym.reservation.exchange
      routing-key: gym.reservation.order
      queue: gym.reservation.queue